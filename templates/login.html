{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-gray-800 p-8 rounded-2xl border border-gray-700 shadow-xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white">Welcome Back</h2>
            <p class="text-gray-400 mt-2">Pick up right where you left off.</p>
        </div>
        
        <form method="POST" action="/login" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Email Address</label>
                <input type="email" name="email" required placeholder="you@example.com" 
                       class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                <input type="password" name="password" required placeholder="••••••••" 
                       class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition">
            </div>
            <button type="submit" class="w-full bg-brand hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-brand/30 mt-4">
                Log In
            </button>
        </form>
        
        <p class="mt-6 text-center text-gray-400 text-sm">
            Don't have an account? <a href="/register" class="text-brand hover:underline font-medium">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
