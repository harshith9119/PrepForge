{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto mt-8 bg-gray-800 p-8 rounded-xl border border-gray-700">
    <h2 class="text-2xl font-bold text-white mb-6">Edit Problem</h2>
    <form method="POST" class="space-y-4">
        <div>
            <label class="text-sm text-gray-400">Title</label>
            <input type="text" name="title" value="{{ problem.title }}" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white">
        </div>
        <div>
            <label class="text-sm text-gray-400">URL</label>
            <input type="url" name="url" value="{{ problem.url }}" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white">
        </div>
        <div>
            <label class="text-sm text-gray-400">Difficulty</label>
            <select name="difficulty" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white">
                <option value="Easy" {% if problem.difficulty == 'Easy' %}selected{% endif %}>Easy</option>
                <option value="Medium" {% if problem.difficulty == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="Hard" {% if problem.difficulty == 'Hard' %}selected{% endif %}>Hard</option>
            </select>
        </div>
        <div>
            <label class="text-sm text-gray-400">Company Tags</label>
            <input type="text" name="company_tags" value="{{ problem.company_tags }}" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white">
        </div>
        <div>
            <label class="text-sm text-gray-400">Topic</label>
            <select name="topic_id" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white">
                {% for t in topics %}
                <option value="{{ t.id }}" {% if problem.topic_id == t.id %}selected{% endif %}>{{ t.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex gap-4 pt-4">
            <button type="submit" class="flex-1 bg-brand text-white py-2 rounded font-bold hover:bg-blue-600">Save Changes</button>
            <a href="/admin" class="px-6 py-2 bg-gray-700 text-white rounded hover:bg-gray-600">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
