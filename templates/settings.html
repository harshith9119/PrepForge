{% extends 'base.html' %}
{% block title %}Settings | PrepForge{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto mt-12">
    <h1 class="text-3xl font-bold text-white mb-2">Settings</h1>
    <p class="text-gray-400 mb-8">Customize your PrepForge experience.</p>

    <form method="POST" class="bg-gray-800 border border-gray-700 rounded-2xl p-6 space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Display Name</label>
            <input type="text" name="name" value="{{ user.name }}" required
                   class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Email</label>
            <input type="email" value="{{ user.email }}" disabled
                   class="w-full bg-gray-900/50 border border-gray-700/50 rounded-xl px-4 py-3 text-gray-500 cursor-not-allowed">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Daily Goal (problems per day)</label>
            <input type="number" name="daily_goal" value="{{ user.daily_goal or 3 }}" min="1" max="20" required
                   class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand">
            <p class="text-xs text-gray-500 mt-2">Tracked on your dashboard. Default is 3 problems/day.</p>
        </div>

        <button type="submit" class="w-full bg-brand hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition">
            Save Settings
        </button>
    </form>
</div>
{% endblock %}
