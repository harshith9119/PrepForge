{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto mt-12">
    <div class="bg-gray-800 rounded-3xl p-8 border border-gray-700 flex flex-col md:flex-row items-center gap-8 shadow-xl relative overflow-hidden">
        <div class="absolute top-0 right-0 w-64 h-64 bg-brand/10 rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>

        <div class="w-32 h-32 bg-gray-900 rounded-full border-4 border-brand flex items-center justify-center shadow-lg shadow-brand/20 z-10">
            <span class="text-5xl font-bold text-brand uppercase">{{ user.name[0] }}</span>
        </div>
        
        <div class="text-center md:text-left z-10">
            <h1 class="text-4xl font-bold text-white mb-2">{{ user.name }}</h1>
            <p class="text-gray-400 text-lg mb-4"><i class="fas fa-envelope mr-2"></i> {{ user.email }}</p>
            {% if user.is_admin %}
                <span class="bg-yellow-500/20 text-yellow-500 px-4 py-1.5 rounded-full text-sm font-semibold tracking-wide border border-yellow-500/30">
                    <i class="fas fa-crown mr-1"></i> Platform Admin
                </span>
            {% endif %}
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 hover:border-brand/50 transition">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-gray-400 font-medium">Problems Solved</h3>
                <i class="fas fa-check-circle text-2xl text-green-500/80"></i>
            </div>
            <p class="text-4xl font-bold text-white">{{ solved }} <span class="text-xl text-gray-500">/ {{ total }}</span></p>
            <div class="w-full bg-gray-900 rounded-full h-2 mt-4">
                <div class="bg-brand h-2 rounded-full" style="width: {{ progress }}%;"></div>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 hover:border-yellow-500/50 transition">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-gray-400 font-medium">Topics Mastered</h3>
                <i class="fas fa-trophy text-2xl text-yellow-500/80"></i>
            </div>
            <p class="text-4xl font-bold text-white">{{ topics_completed }} <span class="text-lg text-gray-400 font-normal ml-2">Categories Completed</span></p>
        </div>
    </div>
</div>
{% endblock %}
